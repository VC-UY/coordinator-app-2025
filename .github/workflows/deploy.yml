name: Deploy Coordinator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deployer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'venv' --exclude '__pycache__' --exclude '.env' \
            --exclude 'logs' --exclude '*.log' --exclude 'db.sqlite3' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/vc-uy/CD/coordinator-app-2025/

      - name: Rebuild and restart Coordinator
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/vc-uy
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production build coordinator-api coordinator-frontend coordinator-proxy
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production up -d coordinator-api coordinator-frontend coordinator-proxy
            for i in 1 2 3 4 5 6; do
              curl -sf http://127.0.0.1:8001/api/system-health/ && break
              sleep 10
            done
            curl -sf http://127.0.0.1:8001/api/system-health/
            echo "Coordinator OK"
